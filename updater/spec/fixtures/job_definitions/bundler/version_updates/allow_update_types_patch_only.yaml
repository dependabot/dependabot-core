job:
  allowed-updates:
    - dependency-name: "dummy-pkg-a"
      update-types:
        - "version-update:semver-patch"
  commit-message-options:
    prefix:
    prefix-development:
    include-scope:
  credentials-metadata:
    - type: git_source
      host: github.com
  debug:
  dependencies:
  dependency-groups: []
  dependency-group-to-refresh:
  existing-pull-requests: []
  existing-group-pull-requests: []
  experiments:
    record-ecosystem-versions: true
    record-update-job-unknown-error: true
    proxy-cached: true
    dependency-change-validation: true
  ignore-conditions: []
  lockfile-only: false
  max-updater-run-time: 2700
  package-manager: bundler
  proxy-log-response-body-on-auth-failure: true
  requirements-update-strategy: bump_versions_if_necessary
  reject-external-code: false
  security-advisories: []
  security-updates-only: false
  source:
    provider: github
    repo: dsp-testing/dependabot-allow-update-types
    branch:
    directory: "/."
    api-endpoint: https://api.github.com/
    hostname: github.com
    commit: mock-sha
  updating-a-pull-request: false
  update-subdependencies: false
  vendor-dependencies: false
  repo-private: true
