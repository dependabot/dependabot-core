[project]
name = "myapp"
version = "1.0.0"
requires-python = ">=3.10"

dependencies = [
    "requests>=2.13.0,<3.0",
    "urllib3==1.26.0",
]

[project.optional-dependencies]
socks = [
    "PySocks >= 1.5.6, != 1.5.7, < 2",
]
tests = [
    "pytest >= 7.0, < 8",
]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"
