[project]
name = "optional-deps-project"
version = "0.1.0"
description = "A project with optional dependencies using Poetry v2"
authors = [
    {name = "Dependabot Support", email = "support@dependabot.com"}
]
requires-python = ">=3.10"
dependencies = [
    "requests>=2.28.0",
]

[project.optional-dependencies]
socks = [
    "PySocks>=1.5.6,!=1.5.7",
]
security = [
    "cryptography>=41.0.0",
]

[tool.poetry]
requires-poetry = ">=2.0"

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"
