[project]
name = "groups-markers-project"
version = "0.1.0"
description = "A project with dependency groups and platform markers using Poetry v2"
authors = [
    {name = "Dependabot Support", email = "support@dependabot.com"}
]
requires-python = ">=3.10"
dependencies = [
    "requests>=2.28.0",
    "colorama>=0.4.6 ; sys_platform == 'win32'",
]

[dependency-groups]
dev = [
    "pytest>=7.0",
    "black>=23.0",
]
docs = [
    "sphinx>=6.0",
]

[tool.poetry]
requires-poetry = ">=2.0"

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"
