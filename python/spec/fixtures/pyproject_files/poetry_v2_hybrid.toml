[project]
name = "hybrid-project"
version = "0.1.0"
description = "A project using PEP 621 dependencies enriched with tool.poetry.dependencies"
authors = [
    {name = "Dependabot Support", email = "support@dependabot.com"}
]
requires-python = ">=3.10"
dependencies = [
    "requests>=2.28.0",
    "flask>=2.3.0",
]

[tool.poetry]
package-mode = false

[tool.poetry.dependencies]
requests = { version = "^2.28", source = "private-source" }
flask = { version = "^2.3", extras = ["async"] }

[[tool.poetry.source]]
name = "private-source"
url = "https://private.example.com/simple"
priority = "supplemental"

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"
