name: Pull Request Labeler

on:  # yamllint disable-line rule:truthy
  - pull_request_target

permissions: {}

jobs:
  triage:
    permissions:
      contents: read
      pull-requests: write

    runs-on: ubuntu-latest

    steps:
      - uses: actions/labeler@b8dd2d9be0f68b860e7dae5dae7d772984eacd6d # v6.2.0
