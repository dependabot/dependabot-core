name: Pull Request Labeler

on:  # yamllint disable-line rule:truthy
  - pull_request_target

permissions: {}

jobs:
  triage:
    permissions:
      contents: read
      pull-requests: write

    runs-on: ubuntu-latest

    steps:
      - uses: actions/labeler@f27b608878404679385c85cfa523b85ccb86e213 # v6.1.0
