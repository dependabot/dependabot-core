name: ARM64 Build
on:  # yamllint disable-line rule:truthy
  pull_request:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  arm64-build:
    runs-on: ubuntu-24.04-arm
    if: github.event_name != 'schedule' || github.repository == 'dependabot/dependabot-core'
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          persist-credentials: false

      - name: Build bundler ecosystem image
        env:
          # Optional Artifactory-backed mirrors for resilience against
          # Canonical / Launchpad outages. Leave unset for default upstream
          # behavior. Configure via repository/organization variables.
          APT_MIRROR_URL: ${{ vars.APT_MIRROR_URL }}
          APT_MIRROR_SECURITY_URL: ${{ vars.APT_MIRROR_SECURITY_URL }}
          APT_MIRROR_PORTS_URL: ${{ vars.APT_MIRROR_PORTS_URL }}
          PPA_MIRROR_BASE_URL: ${{ vars.PPA_MIRROR_BASE_URL }}
        run: script/build bundler
